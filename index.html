<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>CareerConnect AI | Next-Gen AI Recruitment Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                light: '#6366f1',
                DEFAULT: '#4f46e5',
                dark: '#3730a3',
              },
              secondary: {
                light: '#a855f7',
                DEFAULT: '#9333ea',
                dark: '#7e22ce',
              },
              accent: {
                light: '#06b6d4',
                DEFAULT: '#0891b2',
                dark: '#0e7490',
              },
              background: '#0f172a',
            }
          }
        }
      }
    </script>
    <meta name="description" content="CareerConnect AI is a production-grade, AI-powered hiring platform featuring resume analysis, job matching, and real-time interviews. Built for the modern workforce." />
    <meta name="keywords" content="AI Job Portal, Recruitment AI, Resume Analysis, Job Matching, CareerConnect" />
    <meta name="author" content="CareerConnect AI Team" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CareerConnect AI | Next-Gen AI Recruitment" />
    <meta property="og:description" content="Hire better and faster with AI-driven matching and recruitment automation." />
    <meta property="og:image" content="/og-image.jpg" />
    
    <!-- PWA Initial Setup -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#0f172a] text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Web Worker / PWA Registration Mock -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          console.log('Service Worker registration initiated...');
        });
      }
    </script>
  </body>
</html>
